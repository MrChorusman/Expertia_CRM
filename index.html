            // === FORMULARIO DE OFERTAS ===
            function OfferForm({ clients, products, onSave, onCancel, offerData }) {
                const [config, setConfig] = useState(null);

                // Cargar configuración dinámica
                useEffect(() => {
                    loadAppConfig().then(setConfig);
                }, []);

                // Series dinámicas con fallback
                const offerSeries = config ? getConfigValue('offers.series', config) : ['OF'];
                const defaultOfferSeries = Array.isArray(offerSeries) && offerSeries.length > 0 ?
                    offerSeries[0] : 'OF';

                // Estados dinámicos con fallback
                const offerStatuses = config ? getConfigValue('offers.statuses', config) :
                    ['Borrador', 'Enviada', 'Aceptada', 'Rechazada', 'Vencida'];

                // Términos por defecto configurables
                const defaultTerms = config ?
                    getConfigValue('offers.defaultTerms', config) ||
                    'Esta oferta es válida hasta la fecha indicada. Los precios incluyen IVA.' :
                    'Esta oferta es válida hasta la fecha indicada. Los precios incluyen IVA.';

                const [formData, setFormData] = useState({
                    id: offerData?.id || null,
                    clientId: offerData?.client?.id || '',
                    offerNumber: offerData?.offerNumber || '',
                    offerDate: offerData?.offerDate || new Date().toISOString().split('T')[0],
                    validUntil: offerData?.validUntil || new Date(Date.now() + 30 * 24 * 60 * 60 * 1000).toISOString().split('T')[0],
                    status: offerData?.status || (offerStatuses[0] || 'Borrador'),
                    offerSeries: offerData?.offerSeries || defaultOfferSeries,
                    description: offerData?.description || '',
                    items: offerData?.items || [{ description: '', quantity: 1, price: 0, productId: '' }],
                    terms: offerData?.terms || defaultTerms,
                });

                const subtotal = useMemo(() => formData.items.reduce((acc, item) => acc + (Number(item.quantity) || 0) * (Number(item.price) || 0), 0), [formData.items]);
                const vat = useMemo(() => subtotal * VAT_RATE, [subtotal]);
                const total = useMemo(() => subtotal + vat, [subtotal, vat]);

                const handleChange = (e) => {
                    const { name, value } = e.target;
                    setFormData(prev => ({ ...prev, [name]: value }));
                };

                const handleItemChange = (index, e) => {
                    const { name, value } = e.target;
                    const items = [...formData.items];
                    if (name === "productId") {
                        const product = products.find(p => p.id === value);
                        items[index].productId = value;
                        items[index].description = product ? product.name : '';
                        items[index].price = product ? Number(product.price) || 0 : 0;
                    } else if (name === "quantity" || name === "price") {
                        items[index][name] = Number(value) || 0;
                    } else {
                        items[index][name] = value;
                    }
                    setFormData(prev => ({ ...prev, items }));
                };

                const addItem = () => {
                    setFormData(prev => ({
                        ...prev,
                        items: [...prev.items, { description: '', quantity: 1, price: 0, productId: '' }]
                    }));
                };

                const removeItem = (index) => {
                    const items = [...formData.items];
                    items.splice(index, 1);
                    setFormData(prev => ({ ...prev, items }));
                };

                const handleSubmit = (e) => {
                    e.preventDefault();
                    onSave({ ...formData, subtotal, vat, total });
                };

                return (
                    <form onSubmit={handleSubmit} className="max-w-4xl mx-auto bg-white p-8 rounded-lg shadow-lg space-y-6">
                        <div className="flex items-center gap-3 mb-6">

                    const unsubscribe = onSnapshot(q, (snapshot) => {
                        setPayments(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));

                    return () => unsubscribe();

                    printWindow.document.write(printContent);
                    printWindow.document.close();

                    // Abrir directamente el diálogo de impresión
                    setTimeout(() => {
                        printWindow.print();

                // Función para enviar por correo
                const handleSendByEmail = async () => {
                    if (!client || !client.email) {
                        showNotification('Error de email', 'No se encontró el email del cliente. Por favor, verifica que el cliente tenga un email registrado.', 'error');
                        return;

                    // Preguntar si quiere generar PDF primero usando el modal personalizado
                    const userWantsPDF = await showConfirm(

                        'info'
                    );

                        // Usuario confirmó - generar PDF primero
                        handleDownloadPDF();

                        // Esperar un momento y luego mostrar el email
                        setTimeout(() => {
                            openEmailCompose();
                            showNotification('PDF generado', 'No olvides adjuntar el PDF descargado al email antes de enviarlo.', 'info');

                        openEmailCompose();

                const openEmailCompose = () => {

Adjunto encontrará la factura ${invoice.invoiceNumber} correspondiente a los servicios prestados.

Detalles de la factura:
- Número: ${invoice.invoiceNumber}
- Fecha: ${invoice.invoiceDate}
- Importe: ${(invoice.total || 0).toFixed(2)} €
- Estado: ${invoice.status}

Si tiene alguna pregunta sobre esta factura, no dude en contactarnos.

Atentamente,
Expertia Medical Solutions
Tel: +34 912 345 678
Email: info@expertiamedical.com`;

                    const mailtoLink = `mailto:${client.email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;

                },

                // Exportar a PDF con gráficos
                exportToPDF: async (data, filename = 'informe_expertia') => {
                    try {
                        const { jsPDF } = window.jspdf;
                        const pdf = new jsPDF('p', 'mm', 'a4');

                        // Configuración de colores
                        const primaryColor = [0, 128, 128]; // #008080
                        const secondaryColor = [102, 102, 102];

                        // Función para añadir encabezado
                        const addHeader = (pageNum) => {
                            pdf.setFillColor(...primaryColor);
                            pdf.rect(0, 0, 210, 25, 'F');

                            pdf.setTextColor(255, 255, 255);
                            pdf.setFontSize(20);
                            pdf.setFont('helvetica', 'bold');
                            pdf.text('EXPERTIA CRM - Informe de Ventas', 15, 16);

                            pdf.setFontSize(10);
                            pdf.setFont('helvetica', 'normal');
                            pdf.text(`Página ${pageNum}`, 170, 20);
                            pdf.text(new Date().toLocaleDateString('es-ES'), 15, 20);
                        };

                        // Página 1: Resumen ejecutivo
                        addHeader(1);
                        pdf.setTextColor(...secondaryColor);

                        // Estadísticas principales
                        pdf.setFontSize(14);
                        pdf.setFont('helvetica', 'bold');
                        pdf.text('📊 RESUMEN EJECUTIVO', 15, 40);

                        pdf.setFontSize(11);
                        pdf.setFont('helvetica', 'normal');

                        const stats = [
                            `💰 Ventas Totales: ${data.totalSales.toFixed(2)} €`,
                            `📋 Número de Facturas: ${data.totalInvoices}`,
                            `🎯 Ticket Medio: ${data.averageTicket.toFixed(2)} €`,
                            `💼 IVA Recaudado: ${data.totalVat.toFixed(2)} €`,
                            `📅 Período Analizado: ${data.dateFilter === 'all' ? 'Todo el tiempo' : data.dateFilter}`
                        ];

                        stats.forEach((stat, index) => {
                            pdf.text(stat, 15, 55 + (index * 8));
                        });

                        // Top productos
                        if (data.topProducts && data.topProducts.length > 0) {
                            pdf.setFontSize(14);
                            pdf.setFont('helvetica', 'bold');
                            pdf.text('🏆 TOP PRODUCTOS', 15, 105);

                            pdf.setFontSize(10);
                            pdf.setFont('helvetica', 'normal');

                            data.topProducts.slice(0, 5).forEach((product, index) => {
                                const medal = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : `${index + 1}.`;
                                pdf.text(`${medal} ${product.name}: ${product.revenue.toFixed(2)} € (${product.quantity} uds)`, 15, 120 + (index * 6));
                            });
                        }

                        // Capturar gráficos si existen
                        const chartElements = document.querySelectorAll('.bg-white.p-6.rounded-lg.shadow-lg, .bg-white.p-6.rounded-lg.shadow');
                        if (chartElements.length > 0) {
                            pdf.addPage();
                            addHeader(2);

                            pdf.setFontSize(14);
                            pdf.setFont('helvetica', 'bold');
                            pdf.text('📈 GRÁFICOS Y ANÁLISIS', 15, 40);

                            let yPosition = 60;
                            for (let i = 0; i < Math.min(chartElements.length, 2); i++) {
                                try {
                                    const canvas = await html2canvas(chartElements[i], {
                                        scale: 2,
                                        backgroundColor: '#ffffff',
                                        width: 800,
                                        height: 400
                                    });

                                    const imgData = canvas.toDataURL('image/png');
                                    pdf.addImage(imgData, 'PNG', 15, yPosition, 180, 90);
                                    yPosition += 100;

                                    if (i === 0 && chartElements.length > 1) {
                                        pdf.addPage();
                                        addHeader(i + 3);
                                        yPosition = 40;
                                    }
                                } catch (error) {
                                    console.warn('Error capturando gráfico:', error);
                                }
                            }
                        }

                        // Pie de página en todas las páginas
                        const totalPages = pdf.internal.getNumberOfPages();
                        for (let i = 1; i <= totalPages; i++) {
                            pdf.setPage(i);
                            pdf.setFontSize(8);
                            pdf.setTextColor(...secondaryColor);
                            pdf.text('Generado por Expertia CRM - Todos los derechos reservados', 15, 290);
                        }

                        // Guardar PDF
                        pdf.save(`${filename}_${new Date().toISOString().split('T')[0]}.pdf`);
                        return true;

                        console.error('Error exportando PDF:', error);
                        return false;
                    }
                },

                // Copiar datos al portapapeles
                copyToClipboard: (data) => {
                    try {
                        const text = `EXPERTIA CRM - Resumen de Ventas
📅 ${new Date().toLocaleDateString('es-ES')}

📊 ESTADÍSTICAS:
💰 Ventas Totales: ${data.totalSales.toFixed(2)} €
📋 Facturas: ${data.totalInvoices}
🎯 Ticket Medio: ${data.averageTicket.toFixed(2)} €
💼 IVA: ${data.totalVat.toFixed(2)} €

🏆 TOP PRODUCTOS:
${data.topProducts.slice(0, 5).map((p, i) =>
    `${i + 1}. ${p.name}: ${p.revenue.toFixed(2)} € (${p.quantity} uds)`
).join('\n')}`;

                        navigator.clipboard.writeText(text);
                        return true;
                    } catch (error) {
                        console.error('Error copiando al portapapeles:', error);
                        return false;
                    }
                }
            };

            // === DASHBOARD DE INFORMES Y ESTADÍSTICAS ===
            function ReportsDashboard({ allInvoices, userProfile }) {
                const [productFilter, setProductFilter] = useState('all');
                const [salespersonFilter, setSalespersonFilter] = useState('all');
                const [dateFilter, setDateFilter] = useState('all');

                // Verificar si Recharts está disponible
                const hasRecharts = typeof window.Recharts !== 'undefined' && window.rechartsAvailable;

                const paidInvoices = allInvoices.filter(inv => inv.status === 'Pagada');

                const productOptions = useMemo(() => {
                    const products = new Set();
                    paidInvoices.forEach(inv => {
                        if (inv.items) {
                            inv.items.forEach(item => {
                                if(item.description) products.add(item.description);
                            });
                        }
                    });
                    return ['all', ...Array.from(products)];
                }, [paidInvoices]);

                const salespersonOptions = useMemo(() => {
                    const salespersons = new Set();
                    paidInvoices.forEach(inv => {
                        if(inv.createdBy) {
                            // Intentar obtener el nombre del usuario, o usar UID como fallback
                            const userName = inv.createdByName ||
                                           (userProfile?.name) ||
                                           (userProfile?.email) ||
                                           inv.createdBy;
                            salespersons.add(userName);
                        }
                    });
                    return ['all', ...Array.from(salespersons)];
                }, [paidInvoices, userProfile]);

                const filteredInvoices = useMemo(() => {
                    return paidInvoices.filter(inv => {
                        const productMatch = productFilter === 'all' ||
                            (inv.items && inv.items.some(item => item.description === productFilter));

                        const salespersonMatch = salespersonFilter === 'all' ||
                            inv.createdBy === salespersonFilter ||
                            (inv.createdByName && inv.createdByName === salespersonFilter) ||
                            (userProfile?.name && userProfile.name === salespersonFilter) ||
                            (userProfile?.email && userProfile.email === salespersonFilter);

                        let dateMatch = true;
                        if (dateFilter !== 'all') {
                            const invDate = new Date(inv.invoiceDate);
                            const now = new Date();
                            switch(dateFilter) {
                                case 'thisMonth':
                                    dateMatch = invDate.getMonth() === now.getMonth() &&
                                              invDate.getFullYear() === now.getFullYear();
                                    break;
                                case 'lastMonth':
                                    const lastMonth = new Date(now.getFullYear(), now.getMonth() - 1);
                                    dateMatch = invDate.getMonth() === lastMonth.getMonth() &&
                                              invDate.getFullYear() === lastMonth.getFullYear();
                                    break;
                                case 'thisYear':
                                    dateMatch = invDate.getFullYear() === now.getFullYear();
                                    break;
                                case 'lastYear':
                                    dateMatch = invDate.getFullYear() === now.getFullYear() - 1;
                                    break;
                            }
                        }

                        return productMatch && salespersonMatch && dateMatch;
                    });
                }, [paidInvoices, productFilter, salespersonFilter, dateFilter]);

                const salesByMonth = useMemo(() => {
                    const monthlyData = {};
                    const monthNames = ["Ene", "Feb", "Mar", "Abr", "May", "Jun", "Jul", "Ago", "Sep", "Oct", "Nov", "Dic"];

                    filteredInvoices.forEach(inv => {
                        const date = new Date(inv.invoiceDate);
                        if (isNaN(date.getTime())) return;

                        const month = date.getMonth();
                        const year = date.getFullYear();
                        const key = `${year}-${monthNames[month]}`;

                        if (!monthlyData[key]) monthlyData[key] = 0;
                        monthlyData[key] += inv.total;
                    });

                    return Object.entries(monthlyData)
                        .map(([name, Ventas]) => ({
                            name,
                            Ventas: parseFloat(Ventas.toFixed(2))
                        }))
                        .sort((a, b) => {
                            const [yearA, monthA] = a.name.split('-');
                            const [yearB, monthB] = b.name.split('-');
                            const dateA = new Date(yearA, monthNames.indexOf(monthA));
                            const dateB = new Date(yearB, monthNames.indexOf(monthB));
                            return dateA - dateB;
                        });
                }, [filteredInvoices]);

                const salesByQuarter = useMemo(() => {
                    const quarterlyData = {};

                    filteredInvoices.forEach(inv => {
                        const date = new Date(inv.invoiceDate);
                        if (isNaN(date.getTime())) return;

                        const year = date.getFullYear();
                        const quarter = Math.floor(date.getMonth() / 3) + 1;
                        const key = `${year}-T${quarter}`;

                        if (!quarterlyData[key]) quarterlyData[key] = 0;
                        quarterlyData[key] += inv.total;
                    });

                    return Object.entries(quarterlyData)
                        .map(([name, Ventas]) => ({
                            name,
                            Ventas: parseFloat(Ventas.toFixed(2))
                        }))
                        .sort((a, b) => a.name.localeCompare(b.name));
                }, [filteredInvoices]);

                const topProducts = useMemo(() => {
                    const productSales = {};

                    filteredInvoices.forEach(inv => {
                        if (inv.items) {
                            inv.items.forEach(item => {
                                if (item.description) {
                                    if (!productSales[item.description]) {
                                        productSales[item.description] = {
                                            name: item.description,
                                            quantity: 0,
                                            revenue: 0
                                        };
                                    }
                                    productSales[item.description].quantity += item.quantity;
                                    productSales[item.description].revenue += item.quantity * item.price;
                                }
                            });
                        }
                    });

                    return Object.values(productSales)
                        .sort((a, b) => b.revenue - a.revenue)
                        .slice(0, 5);
                }, [filteredInvoices]);

                // 🚀 MEJORA 4/4: Datos adicionales para nuevos gráficos minimalistas
                const salesBySalesperson = useMemo(() => {
                    const salespersonSales = {};

                    filteredInvoices.forEach(invoice => {
                        const salesperson = invoice.createdBy || 'Sin asignar';
                        if (!salespersonSales[salesperson]) {
                            salespersonSales[salesperson] = {
                                name: salesperson,
                                value: 0,
                                count: 0
                            };
                        }
                        salespersonSales[salesperson].value += parseFloat(invoice.total || 0);
                        salespersonSales[salesperson].count += 1;
                    });

                    return Object.values(salespersonSales)
                        .filter(item => item.value > 0)
                        .sort((a, b) => b.value - a.value);
                }, [filteredInvoices]);

                const monthlyTrend = useMemo(() => {
                    const last6Months = [];
                    const currentDate = new Date();

                    // Generar últimos 6 meses
                    for (let i = 5; i >= 0; i--) {
                        const date = new Date(currentDate.getFullYear(), currentDate.getMonth() - i, 1);
                        const monthKey = `${date.getFullYear()}-${(date.getMonth() + 1).toString().padStart(2, '0')}`;
                        const monthName = date.toLocaleDateString('es-ES', { month: 'short', year: '2-digit' });

                        last6Months.push({
                            name: monthName,
                            key: monthKey,
                            Ventas: 0
                        });
                    }

                    // Calcular ventas por mes
                    filteredInvoices.forEach(invoice => {

                        const start = polarToCartesian(centerX, centerY, radius, endAngle);
                        const end = polarToCartesian(centerX, centerY, radius, startAngle);
                        const largeArcFlag = endAngle - startAngle <= 180 ? "0" : "1";
                        return [
                            "M", centerX, centerY,
                            "L", start.x, start.y,
                            "A", radius, radius, 0, largeArcFlag, 0, end.x, end.y,
                            "Z"
                        ].join(" ");
                    };

                    const polarToCartesian = (centerX, centerY, radius, angleInDegrees) => {
                        const angleInRadians = (angleInDegrees - 90) * Math.PI / 180.0;
                        return {
                            x: centerX + (radius * Math.cos(angleInRadians)),

                // 🚀 MEJORA 4/4: Gráfico de tendencias minimalista

                            <div className="flex-1 min-w-[150px]">
                                <label htmlFor="productFilter" className="text-sm font-medium text-gray-700 block mb-1">Producto</label>
                                <select id="productFilter" value={productFilter} onChange={e => setProductFilter(e.target.value)} className="w-full p-2 border border-gray-300 rounded-md">
                                    {productOptions.map(opt => <option key={opt} value={opt}>{opt === 'all' ? 'Todos los productos' : opt}</option>)}
                                </select>
                            </div>

                            <div className="flex-1 min-w-[150px]">
                                <label htmlFor="salespersonFilter" className="text-sm font-medium text-gray-700 block mb-1">Comercial</label>
                                <select id="salespersonFilter" value={salespersonFilter} onChange={e => setSalespersonFilter(e.target.value)} className="w-full p-2 border border-gray-300 rounded-md">
                                    {salespersonOptions.map(opt => <option key={opt} value={opt}>{opt === 'all' ? 'Todos los comerciales' : opt}</option>)}
                                </select>
                            </div>

                            {/* Botones de acción */}
                            <div className="flex items-end gap-2">
                                <button
                                    onClick={() => ExportUtils.exportToExcel({ invoices: filteredInvoices, totalSales, totalInvoices, averageTicket, totalVat, topProducts })}
                                    className="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 flex items-center gap-2"
                                    title="Exportar a Excel"
                                >
                                    <DownloadIcon width={16} height={16} /> Excel
                                </button>
                                <button
                                    onClick={() => ExportUtils.exportToPDF({ totalSales, totalInvoices, averageTicket, totalVat, topProducts, dateFilter })}
                                    className="bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700 flex items-center gap-2"
                                    title="Exportar a PDF"
                                >
                                    <FileTextIcon width={16} height={16} /> PDF
                                </button>
                                <button
                                    onClick={() => {
                                        ExportUtils.copyToClipboard({ totalSales, totalInvoices, averageTicket, totalVat, topProducts });
                                        alert('Resumen copiado al portapapeles.');
                                    }}
                                    className="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 flex items-center gap-2"
                                    title="Copiar resumen"
                                >
                                    <CopyIcon width={16} height={16} /> Copiar
                                </button>
                            </div>
                        </div>

                        {/* Métricas clave */}
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                            <StatCard title="Ventas Totales" value={`${totalSales.toFixed(2)} €`} icon={<TrendingUpIcon />} />
                            <StatCard title="Nº de Facturas" value={totalInvoices} icon={<FileTextIcon />} />
                            <StatCard title="Ticket Medio" value={`${averageTicket.toFixed(2)} €`} icon={<DollarSignIcon />} />
                            <StatCard title="IVA Total" value={`${totalVat.toFixed(2)} €`} icon={<AwardIcon />} />
                        </div>

                        {/* Visualizaciones de datos */}
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            {hasRecharts ? (
                                <>
                                    <div className="lg:col-span-2 bg-white p-6 rounded-lg shadow-lg">
                                        <h3 className="text-xl font-semibold mb-4 text-gray-800">Ventas por Mes</h3>
                                        <ResponsiveContainer width="100%" height={300}>
                                            <BarChart data={salesByMonth}>
                                                <CartesianGrid strokeDasharray="3 3" />
                                                <XAxis dataKey="name" />
                                                <YAxis />
                                                <Tooltip />
                                                <Legend />
                                                <Bar dataKey="Ventas" fill="#008080" />
                                            </BarChart>
                                        </ResponsiveContainer>
                                    </div>
                                    <div className="bg-white p-6 rounded-lg shadow-lg">
                                        <h3 className="text-xl font-semibold mb-4 text-gray-800">Top 5 Productos</h3>
                                        <ResponsiveContainer width="100%" height={300}>
                                            <BarChart data={topProducts} layout="vertical">
                                                <CartesianGrid strokeDasharray="3 3" />
                                                <XAxis type="number" />
                                                <YAxis type="category" dataKey="name" width={120} />
                                                <Tooltip />
                                                <Legend />
                                                <Bar dataKey="revenue" name="Ingresos" fill="#20b2aa" />
                                            </BarChart>
                                        </ResponsiveContainer>
                                    </div>
                                </>
                            ) : (
                                <>
                                    <div className="lg:col-span-2">
                                        <SimpleBarChart data={salesByMonth} title="Ventas por Mes" />
                                    </div>
                                    <div>
                                        <SimplePieChart data={topProducts.map(p => ({ name: p.name, Ventas: p.revenue }))} title="Top Productos por Ingresos" />
                                    </div>
                                </>
                            )}
                        </div>

                        {/* 🚀 MEJORA 4/4: Nuevos gráficos minimalistas */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <TrendLineChart data={monthlyTrend} title="Tendencia últimos 6 meses" />
                            <SalespersonDistribution data={salesBySalesperson} title="Ventas por Comercial" />
                            <SimpleBarChart data={salesByQuarter} title="Ventas por Trimestre" />
                        </div>
                    </div>
                );
            }

            function AdminPanel() {
                return (
                    <div className="max-w-4xl mx-auto">
                        <h1 className="text-3xl font-bold text-gray-900 mb-6">Panel de Administración</h1>
                        <div className="bg-white rounded-lg shadow-lg p-8">
                            <h2 className="text-xl font-semibold text-gray-800 mb-4">Configuración del Sistema</h2>
                            <p className="text-gray-600">
                                Esta sección está en desarrollo. Aquí los administradores podrán configurar
                                aspectos clave del CRM como series de facturación, categorías de productos,
                                roles de usuario y más.
                            </p>
                            <div className="mt-6 p-4 bg-blue-50 border-l-4 border-blue-400">
                                <h3 className="font-bold text-blue-800">Próximas funcionalidades:</h3>
                                <ul className="list-disc list-inside text-sm text-blue-700 mt-2">
                                    <li>Gestión de usuarios y permisos.</li>
                                    <li>Configuración de series de facturas y ofertas.</li>
                                    <li>Personalización de categorías y etiquetas.</li>
                                    <li>Importación/Exportación masiva de datos.</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                );
            }

            // --- Inicialización de la aplicación ---
            const container = document.getElementById('root');
            const root = ReactDOM.createRoot(container);
            root.render(<App />);
        }

        // Esperar a que el DOM esté listo
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', startApp);
        } else {
            startApp();
        }
    </script>
</body>
</html>
